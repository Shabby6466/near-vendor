version: "3"
services:

  redis:
    image: 'bitnami/redis:latest'
    volumes:
      - redis:/var/lib/redis/data/
    container_name: 'nearvendor_redis'
    restart: 'always'
    env_file:
      - _database.env
    networks:
      - nearvendor-backend

  db:
    image: 'postgis/postgis'
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    container_name: 'nearvendor_db'
    restart: 'always'
    env_file:
      - _database.env
    networks:
      - nearvendor-backend

  backend:
    build:
      context: .
    image: nearvendor-backend:latest
    container_name: 'nearvendor_backend'
    depends_on:
      - db
    volumes:
      - ./src:/app/src
      - .env:/app/.env
    ports:
      - '3836:3836'
    networks:
      - nearvendor-backend

networks:
  nearvendor-backend:
volumes:
  postgres-data:
  redis:
