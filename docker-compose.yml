version: "3"
services:

  redis:
    image: 'bitnami/redis:latest'
    volumes:
      - redis:/var/lib/redis/data/
    container_name: 'nearvendor_redis'
    restart: 'always'
    env_file:
      - _database.env
    networks:
      - nearvendor-backend

  db:
    image: 'postgis/postgis'
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    container_name: 'nearvendor_db'
    restart: 'always'
    env_file:
      - _database.env
    networks:
      - nearvendor-backend

  backend:
    build:
      context: .
    image: nearvendor-backend:latest
    container_name: 'nearvendor_backend'
    depends_on:
      - db
    env_file:
      - .env
    # Removed src mounting for production as it can cause sync issues or crashes if folders are missing
    ports:
      - '3836:3836'
    networks:
      - nearvendor-backend

  nginx:
    image: 'nginx:1.27.0-alpine'
    container_name: 'nearvendor_nginx'
    restart: 'always'
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - nearvendor-backend

networks:
  nearvendor-backend:
volumes:
  postgres-data:
  redis:
