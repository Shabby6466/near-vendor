# =============================================================
#   Server for redirecting HTTP to HTTPS
# =============================================================
server {
    listen 80;
    server_name api.nearvendor.pro;

    # Let's Encrypt challenge handler
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================
#   API Backend Server (HTTPS)
# =============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name api.nearvendor.pro;

    # SSL Configuration
    # Note: If your certificate name is different (e.g., api.nearvendor.pro-0001), 
    # please update the paths below accordingly.
    ssl_certificate /etc/letsencrypt/live/api.nearvendor.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nearvendor.pro/privkey.pem;
    
    # Standard security headers
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy all requests to Backend API
    location / {
        proxy_pass http://backend:3836;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
