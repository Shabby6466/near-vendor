# =============================================================
#   API Backend Server (Initial HTTP Setup)
# =============================================================
server {
    listen 80;
    server_name api.nearvendor.pro;

    # Let's Encrypt challenge handler
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy all requests to Backend API
    location / {
        proxy_pass http://backend:3836;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ONCE YOU HAVE CERTIFICATES, ADD THE SSL BLOCK BACK
