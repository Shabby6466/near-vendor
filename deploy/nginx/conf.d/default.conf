# =============================================================
#   Server for redirecting HTTP to HTTPS
# =============================================================
server {
    listen 80;
    server_name api.nearvendor.pro;

    # Let's Let's Encrypt challenge handler
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================
#   API Backend Server (HTTPS)
# =============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name api.nearvendor.pro;

    # SSL Configuration (Direct)
    ssl_certificate /etc/letsencrypt/live/api.nearvendor.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nearvendor.pro/privkey.pem;
    
    # Modern SSL settings (replacing options-ssl-nginx.conf)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 50M;

    # Proxy all requests to Backend API
    location / {
        proxy_pass http://backend:3836;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
