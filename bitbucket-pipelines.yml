#  Template NodeJS build

#  This template allows you to validate your NodeJS code.
#  The workflow allows running tests and code linting on the default branch.

image: node:lts-alpine

definitions:
  services:
    postgres:
      image: postgres:latest
      environment:
        POSTGRES_DB: nearvendor_test
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: '12345678'
        DATABASE_URL: postgres://postgres@127.0.0.1:5432/nearvendor_test
    redis:
      image: redis
      command: /bin/sh -c "redis-server --requirepass '12345678'"

pipelines:
  pull-requests:
    '**':
      - step:
          size: 2x
          name: Build and Test
          caches:
            - node
          script:
            - export NODE_OPTIONS=--max_old_space_size=5096
            - npm install
            - npm test
          services:
            - postgres
            - redis
  branches:
    main:
      - step:
          name: Build and Test
          size: 2x
          caches:
            - node
          services:
            - postgres
            - redis
          script:
            - export NODE_OPTIONS=--max_old_space_size=5096
            - npm install
            - npm test
      - step:
          name: Deploy to Production
          deployment: production
          script:
            - pipe: atlassian/ssh-run:0.4.1
              variables:
                SSH_USER: $SSH_USER
                SERVER: $SSH_HOST
                SSH_KEY: $SSH_PRIVATE_KEY
                COMMAND: |
                  cd ~/projects/near-vendor/backend/deploy
                  git pull origin main
                  ./deploy.sh build
                  ./deploy.sh start
